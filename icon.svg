<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Contenedor Cuadrado App Icon (Esquinas suavemente redondeadas) -->
  <rect width="512" height="512" rx="100" fill="#0B0F19"/>

  <!-- ESQUINEROS DE ENCUADRE / VIEWFINDER -->
  <g stroke="#38BDF8" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <!-- Esquina Superior Izquierda -->
    <path d="M 120 160 L 120 120 L 160 120" />
    <!-- Esquina Superior Derecha -->
    <path d="M 392 160 L 392 120 L 352 120" />
    <!-- Esquina Inferior Izquierda -->
    <path d="M 120 352 L 120 392 L 160 392" />
    <!-- Esquina Inferior Derecha -->
    <path d="M 392 352 L 392 392 L 352 392" />
  </g>

  <!-- MONOGRAMA "S" (Arriba / Izquierda) -->
  <path d="M 250 170 
           C 250 150, 180 140, 180 180 
           C 180 220, 250 210, 250 250 
           C 250 290, 180 280, 180 260" 
        fill="none" 
        stroke="#10B981" 
        stroke-width="26" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- MONOGRAMA "R" (Abajo / Derecha) -->
  <path d="M 270 240 L 270 340 
           M 270 240 L 320 240 
           C 350 240, 350 285, 320 285 
           L 270 285 
           M 305 285 L 335 340" 
        fill="none" 
        stroke="#F8FAFC" 
        stroke-width="26" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- PUNTO INDICADOR REC / FOCO (Detalle mínimo opcional) -->
  <circle cx="342" cy="170" r="10" fill="#EF4444" />
</svg>